<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Filmes</title>
    <meta name="icon">

    <link rel="stylesheet" href="/Javascript/css/style.css">
    <link rel="stylesheet" href="/Javascript/src/notie/dist/notie.min.css">
</head>

<body class="api__secao__body">
    <header class="api__secao__header">
        <div class="header__navigate__menu">
            <div class="header__navigate__logo">
                <img src="/Javascript/assets/icons/film-slate.png" alt="Movie icon">
                <p>API Filmes</p>
            </div>

            <div class="header__navigate__search">
                <div class="header__navigate--box-name">
                    <label for="movie-name">Movie name </label>
                    <input type="text" name="movie-name" id="movie-name">
                </div>

                <div class="header__navigate__box-year">
                    <label for="movie-year">Movie year </label>
                    <input type="text" name="movie-year" id="movie-year">
                </div>

                <button id="btn-search-movie">
                    <img src="/Javascript/assets/icons/loupe.png" alt="ícone de lupa">
                </button>
            </div>
        </div>
    </header>

    <main class="api__secao__main">
        <div class="main__header__title">
            <h2>Movies List!</h2>
            <div class="main__header__lista">
                <article>
                    <img src="https://m.media-amazon.com/images/M/MV5BNGY3N2ZhYmMtYTlmYi00ZWIzLWJiZWMtMjgxMjljYTk3MDAwXkEyXkFqcGc@._V1_QL75_UX380_CR0,0,380,562_.jpg"
                        alt="Movie Poster">
                    <button class="btn-remove-list" type="button">
                        <img src="/Javascript/assets/icons/remove.png">Remove movie
                    </button>
                </article>
            </div>
        </div>

        <article id="modal-overlay" class="api__secao__main--modal-overlay">
            <section id="modal-background" class="modal-background"></section>

            <section id="modal-container" class="api__secao__main--modal-container">

            </section>
        </article>
    </main>

    <footer></footer>

    <script src="/Javascript/scripts/scripts-filmes.js"></script>
    <script src="/Javascript/src/notie/dist/notie.min.js"></script>
</body>

</html>
