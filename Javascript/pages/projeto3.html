<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Comerce</title>

    <link rel="stylesheet" href="/Javascript/css/style.css">
</head>

<body class="secao__body__container">

    <header class="secao__header__superior">

        <div class="header__menu__superior">

            <a href="#" class="logo">
                <img src="/Javascript/assets/vynora-ecommerce.svg" alt="Logo Vynora">
            </a>

            <nav class="navigate_buttons">
                <div>
                    <button aria-label="Perfil do usuário">
                        <img src="/Javascript/assets/icons/user-main-char.svg" alt="">
                        <p>Pedidos</p>
                    </button>
                </div>
                <div>
                    <button aria-label="Carrinho">
                        <img src="/Javascript/assets/icons/cart-shop-list.svg" alt="">
                        <p>Carrinho</p>
                    </button>
                </div>
            </nav>

        </div>

    </header>

    <main class="secao__main__container">
        <p>Catálogo de Produtos </p>
        <section id="product-list" class="secao__main__catalago">

        </section>
    </main>

    <script src="/Javascript/scripts/script-ecomerce.js" defer></script>
</body>

</html>
