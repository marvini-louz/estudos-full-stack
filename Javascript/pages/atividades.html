<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividades Práticas</title>
    <link rel="stylesheet" href="/Javascript/css/style.css">
</head>

<body>
    <header>
        <nav>
            <a href="/Javascript/index.html">Home</a>
        </nav>
    </header>
    <div class="secao__pitagoras">
        <h2>Teorema de Pitágoras - Hipotenusa</h2>
        <div class="answer-container">
            <img src="https://static.todamateria.com.br/upload/pi/ta/pitagoras-cke.jpg" alt="Busto de Pitágoras."
                id="pythagoras" />
            <div id="answer" class="hidden-element"></div>
        </div>
        <div class="inputs-container">
            <label for="side-1">Primeiro Cateto</label>
            <input id="side-1" type="text" />
            <label for="side-2">Segundo Cateto</label>
            <input id="side-2" type="text" />
            <button id="calculate-hypotenuse">
                Calcular Hipotenusa
            </button>
        </div>
    </div>

    <div class="secao__bhaskara">
        <h2>Bhaskara</h2>
        <div class="answerBhaskara">
            <img src="https://guiadoestudante.abril.com.br/wp-content/uploads/sites/4/2023/11/Orange-Colorful-Problem-Solving-Note-Organizer-1.jpg?quality=70&strip=info"
                alt="Fórmula de Bhaskara." id="bhaskara" />
            <div id="answerBhaskara" class="hidden-element"></div>
        </div>

        <div class="inputs-container">
            <label for="number-a">Valor A</label>
            <input id="number-a" type="number" />
            <label for="number-b">Valor B</label>
            <input id="number-b" type="number" />
            <label for="number-c">Valor C</label>
            <input id="number-c" type="number" />
            <button id="calculate-bhaskara">
                Calcular Bhaskara
            </button>
        </div>
    </div>


    <script src="/Javascript/scripts/script-atividades.js" defer></script>
</body>

</html>
