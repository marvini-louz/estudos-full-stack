<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Carrossel</title>

        <link rel="stylesheet" href="carrossel-style.css" />
    </head>
    <body>
        <main>
            <section class="flex">
                <div class="flex container-carrossel">
                    <button type="button" class="btn-style left">&lt;</button>
                    <div class="overflow-carrossel">
                        <div class="flex imgs-carrossel">
                            <div class="flex container-img img-nofocus">
                                <img
                                    class="img-style"
                                    src="https://i.pinimg.com/736x/b2/f8/11/b2f811ae2b2d73f7cd17c0cb98cadb0c.jpg"
                                    alt=""
                                />
                            </div>
                            <div class="flex container-img img-nofocus">
                                <img
                                    class="img-style"
                                    src="https://i.pinimg.com/736x/f4/bd/91/f4bd91efd07324d2195c990fa6bbef68.jpg"
                                    alt=""
                                />
                            </div>
                            <div class="flex container-img">
                                <img
                                    class="img-style"
                                    src="https://i.pinimg.com/736x/da/19/15/da1915e23115ac0b1d6deedb15378af5.jpg"
                                    alt=""
                                />
                            </div>
                            <div class="flex container-img img-nofocus">
                                <img
                                    class="img-style"
                                    src="https://i.pinimg.com/1200x/e3/3b/15/e33b154beb0f646f666a09e51414fb79.jpg"
                                    alt=""
                                />
                            </div>
                            <div class="flex container-img img-nofocus">
                                <img
                                    class="img-style"
                                    src="https://i.pinimg.com/736x/16/fc/30/16fc30633212d49337899ea29fb67459.jpg"
                                    alt=""
                                />
                            </div>
                        </div>
                    </div>
                    <button type="button" class="btn-style right">&gt;</button>
                </div>
            </section>
        </main>
    </body>
</html>
